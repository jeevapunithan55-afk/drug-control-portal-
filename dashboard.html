<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Drugs Control Encryption Console</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; height: 100vh; background: #0f172a; color: #f8fafc; }
        #inbox { width: 45%; background: #1e293b; padding: 20px; overflow-y: auto; box-sizing: border-box; border-right: 1px solid #334155; }
        #map-box { width: 55%; height: 100%; }
        
        .card { background: #0f172a; padding: 18px; margin-bottom: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #334155; }
        .card.P2 { border-left: 6px solid #10b981; }
        .card.P1 { border-left: 6px solid #ef4444; }
        
        .badge { display: inline-block; padding: 4px 8px; font-weight: bold; border-radius: 4px; font-size: 11px; margin-bottom: 8px; color: white; text-transform: uppercase; }
        .badge.P2 { background: #10b981; }
        .badge.P1 { background: #ef4444; }
        .badge.comm-alert { background: #3b82f6; }
        
        .field-title { font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: bold; margin: 8px 0 2px 0; }
        .field-data { font-size: 14px; margin: 0 0 8px 0; color: #cbd5e1; }

        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f172a; width: 100%; position: absolute; z-index: 9999; }
        .login-box { background: #1e293b; padding: 35px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        .login-input { padding: 12px; font-size: 16px; width: 260px; margin-bottom: 15px; border: 1px solid #475569; border-radius: 6px; background: #0f172a; color: white; text-align: center; }
        .login-btn { background: #2563eb; border: none; padding: 12px 25px; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; text-transform: uppercase; }
        .login-btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="margin-top:0; color:#f1f5f9; font-size: 20px;">TAMIL NADU DRUGS CONTROL ADMIN</h2>
        <input type="password" id="pass-field" class="login-input" placeholder="••••••••"><br>
        <button class="login-btn" onclick="verifyAdminKey()">Unlock Control Console</button>
        <p id="err-msg" style="color: #ef4444; font-size: 13px; margin: 10px 0 0 0;"></p>
    </div>
</div>

<div id="inbox">
    <h2>Secure Case Intel Feed</h2>
    <hr style="border-color: #334155; margin-bottom: 20px;">
    <div id="reports-container">Awaiting Authorization...</div>
</div>
<div id="map-box"></div>

<script>
    let map;
    const mapMarkers = {};

    function verifyAdminKey() {
        const inputPass = document.getElementById('pass-field').value;
        fetch('/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: inputPass })
        })
        .then(res => res.json())
        .then(res => {
            if(res.success) {
                document.getElementById('login-screen').style.display = 'none';
                loadMapSystem(res.data);
            } else {
                document.getElementById('err-msg').innerText = res.msg;
            }
        });
    }

    function loadMapSystem(reports) {
        map = L.map('map-box').setView([13.0988, 80.2520], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png').addTo(map);

        const container = document.getElementById('reports-container');
        if (reports.length === 0) { container.innerHTML = "<p style='color:#64748b;'>No case alerts submitted yet.</p>"; return; }
        container.innerHTML = "";
        
        reports.forEach((report, index) => {
            const sector = report.jurisdiction || 'P2';
            const markerColor = sector === 'P1' ? '#ef4444' : '#10b981';
            
            const card = document.createElement('div');
            card.className = `card ${sector}`;
            card.onclick = () => {
                map.setView([report.lat, report.lng], 16);
                mapMarkers[index].openPopup();
            };
            
            card.innerHTML = `
                <span class="badge ${sector}">${sector} Division</span>
                <span class="badge comm-alert">${report.comm_willingness}</span>
                
                <div class="field-title">1. Incident Observations:</div>
                <div class="field-data">${report.incident_details}</div>
                
                <div class="field-title">2. Specified Landmark/Location:</div>
                <div class="field-data">${report.location}</div>
                
                <div class="field-title">3. Timeline Data:</div>
                <div class="field-data">${report.incident_time}</div>
                
                <div class="field-title">4. Substance Classification:</div>
                <div class="field-data">${report.substance_known || 'Not Specified'}</div>
                
                <div class="field-title">5. Suspect Physical Profile:</div>
                <div class="field-data">${report.details}</div>
                
                <div class="field-title">6. Suspect Identity/Vehicles:</div>
                <div class="field-data">${report.user_details || 'None Provided'}</div>
                
                <div class="field-title">Contact Channels:</div>
                <div class="field-data"><b>Number:</b> ${report.contact_number || 'N/A (100% Anonymous)'}</div>
                
                <div style="margin-top: 12px;">
                    <a href="/uploads/${report.file}" target="_blank" style="color:#3b82f6; font-weight:bold; font-size:13px; text-decoration:none;" onclick="event.stopPropagation();">📂 OPEN ATTACHED EVIDENCE PROOF</a>
                </div>
            `;
            container.appendChild(card);

            const marker = L.circleMarker([report.lat, report.lng], { 
                radius: 9, fillColor: markerColor, color: '#fff', weight: 1.5, fillOpacity: 0.9 
            }).addTo(map);
            
            marker.bindPopup(`<b>[${sector} Alert]</b><br>Landmark: ${report.location}<br>Substance: ${report.substance_known}`);
            mapMarkers[index] = marker;
        });
    }
</script>
</body>
</html>
